name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Linux 多架构 CLI（静态 musl 优先）。只构建 `unhide` 二进制（不含 GUI）。
  # ---------------------------------------------------------------------------
  linux-cli:
    name: linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
          - i686-unknown-linux-musl
          - riscv64gc-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build (cross)
        run: cross build --release --target ${{ matrix.target }} -p unhide-cli
      - name: Package
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DIST="unhide-rs-${TAG}-${{ matrix.target }}"
          mkdir -p "$DIST"
          cp "target/${{ matrix.target }}/release/unhide" "$DIST/"
          cp README.md README_zh.md LICENSE "$DIST/" 2>/dev/null || true
          cp -r docs "$DIST/" 2>/dev/null || true
          tar czf "${DIST}.tar.gz" "$DIST"
          sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            unhide-rs-*-${{ matrix.target }}.tar.gz
            unhide-rs-*-${{ matrix.target }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Linux x86_64 桌面：CLI + GUI（需要图形开发库）。
  # ---------------------------------------------------------------------------
  linux-gui:
    name: linux x86_64 (CLI + GUI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev libgtk-3-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build (CLI + GUI)
        run: cargo build --release --workspace
      - name: Package
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DIST="unhide-rs-${TAG}-x86_64-unknown-linux-gnu"
          mkdir -p "$DIST"
          cp target/release/unhide target/release/unhide-gui "$DIST/"
          cp README.md README_zh.md LICENSE "$DIST/" 2>/dev/null || true
          cp -r docs "$DIST/" 2>/dev/null || true
          tar czf "${DIST}.tar.gz" "$DIST"
          sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            unhide-rs-*-x86_64-unknown-linux-gnu.tar.gz
            unhide-rs-*-x86_64-unknown-linux-gnu.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # macOS：CLI + GUI，Intel 与 Apple Silicon。
  # ---------------------------------------------------------------------------
  macos:
    name: macos ${{ matrix.target }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build (CLI + GUI)
        run: cargo build --release --workspace --target ${{ matrix.target }}
      - name: Package
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DIST="unhide-rs-${TAG}-${{ matrix.target }}"
          mkdir -p "$DIST"
          cp "target/${{ matrix.target }}/release/unhide" "$DIST/"
          cp "target/${{ matrix.target }}/release/unhide-gui" "$DIST/"
          cp README.md README_zh.md LICENSE "$DIST/" 2>/dev/null || true
          cp -r docs "$DIST/" 2>/dev/null || true
          tar czf "${DIST}.tar.gz" "$DIST"
          shasum -a 256 "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            unhide-rs-*-${{ matrix.target }}.tar.gz
            unhide-rs-*-${{ matrix.target }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # FreeBSD：在真实 VM 内原生构建 CLI（best-effort；cross 对 *BSD 支持有限）。
  # ---------------------------------------------------------------------------
  freebsd:
    name: freebsd x86_64 (CLI)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y rust
          run: |
            cargo build --release -p unhide-cli
            TAG="${{ github.event.inputs.tag || github.ref_name }}"
            DIST="unhide-rs-${TAG}-x86_64-unknown-freebsd"
            mkdir -p "$DIST"
            cp target/release/unhide "$DIST/"
            cp README.md README_zh.md LICENSE "$DIST/" 2>/dev/null || true
            cp -r docs "$DIST/" 2>/dev/null || true
            tar czf "${DIST}.tar.gz" "$DIST"
            sha256 "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256" || sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            unhide-rs-*-x86_64-unknown-freebsd.tar.gz
            unhide-rs-*-x86_64-unknown-freebsd.tar.gz.sha256
